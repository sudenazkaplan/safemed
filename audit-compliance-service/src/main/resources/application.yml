spring:
  application:
    name: audit-compliance-service
  datasource:
    url: jdbc:postgresql://localhost:5433/safemed_audit_db
    username: safemed_user
    password: safemed_password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8083

# grpc server runs on its own port, separate from the http server
grpc:
  server:
    port: 9090

logging:
  level:
    org.hibernate.orm.jdbc.bind: TRACE