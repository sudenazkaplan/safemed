spring:
  application:
    name: schema-registry-service
  datasource:
    url: jdbc:postgresql://localhost:5433/safemed_audit_db
    username: safemed_user
    password: safemed_password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8082

# swagger / openapi paths
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html