version: '3.8'

services:
  safemed-rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: safemed-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  safemed-postgres:
    image: postgres:15-alpine
    container_name: safemed-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: safemed_user
      POSTGRES_PASSWORD: safemed_password
      POSTGRES_DB: safemed_audit_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  safemed-mongodb:
    image: mongo:6.0
    container_name: safemed-mongodb
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: safemed_admin
      MONGO_INITDB_ROOT_PASSWORD: safemed_password
    volumes:
      - mongodb_data:/data/db

volumes:
  rabbitmq_data:
  postgres_data:
  mongodb_data: