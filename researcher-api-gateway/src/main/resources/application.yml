server:
  port: 8080

spring:
  application:
    name: researcher-api-gateway
  # shared postgres instance, same as the other services
  datasource:
    url: jdbc:postgresql://localhost:5433/safemed_audit_db
    username: safemed_user
    password: safemed_password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  # redis cache backend
  data:
    redis:
      host: localhost
      port: 6379

# jwt signing config (override in prod via env vars)
jwt:
  secret: change-this-very-long-secret-key-for-safemed-gateway-jwt-auth
  expiration-ms: 86400000 # 24h